version: "3.9"
services:
  mongo:
    image: mongo:7
    container_name: ticketflow-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 5s
      timeout: 10s
      retries: 10

volumes:
  mongo-data:
